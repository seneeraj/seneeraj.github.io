<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neeraj's AI Portfolio</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    h1 {
      margin-top: 20px;
    }
    .repo {
      background: #1e293b;
      margin: 10px auto;
      padding: 15px;
      width: 60%;
      border-radius: 10px;
    }
    a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>🚀 My AI Projects Portfolio</h1>
<div id="repos"></div>

<script>
fetch("https://api.github.com/users/seneeraj/repos")
  .then(response => response.json())
  .then(data => {
    let reposHTML = "";
    data
      .filter(repo => !repo.fork)
      .forEach(repo => {
        reposHTML += `
          <div class="repo">
            <a href="${repo.html_url}" target="_blank">
              ${repo.name}
            </a>
            <p>${repo.description || "No description available"}</p>
          </div>
        `;
      });
    document.getElementById("repos").innerHTML = reposHTML;
  });
</script>

</body>
</html>
