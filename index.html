<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neeraj Bhatia | AI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #020617;
  color: white;
}
.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px;
}
.section {
  padding: 80px 0;
}
.hero {
  text-align: center;
}
.hero h1 {
  font-size: 48px;
}
.hero p {
  color: #94a3b8;
  font-size: 18px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}
@media (max-width: 992px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
}
.card {
  background: #0f172a;
  border-radius: 16px;
  overflow: hidden;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-6px);
}
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}
.card-content {
  padding: 20px;
}
.tag {
  display: inline-block;
  padding: 5px 10px;
  background: #1e293b;
  border-radius: 6px;
  font-size: 12px;
  color: #38bdf8;
  margin-bottom: 10px;
}
.card h3 {
  margin: 10px 0;
  font-size: 18px;
}
.card p {
  color: #94a3b8;
  font-size: 14px;
}
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: 6px;
  background: #38bdf8;
  color: black;
  text-decoration: none;
  font-size: 13px;
}
.filters {
  text-align: center;
}
.filters .btn {
  margin: 5px;
}
.footer {
  text-align: center;
  padding: 40px 0;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">

<div class="section hero">
  <h1>Neeraj Bhatia</h1>
  <p>Artificial Intelligence Systems | Trading Intelligence | Cybersecurity Tools</p>
</div>

<div class="section filters">
  <h2>📂 My Projects</h2>
  <button class="btn" onclick="filterRepos('all')">All</button>
  <button class="btn" onclick="filterRepos('ai')">AI</button>
  <button class="btn" onclick="filterRepos('trading')">Trading</button>
  <button class="btn" onclick="filterRepos('security')">Cybersecurity</button>
</div>

<div class="section">
  <div class="grid" id="repos"></div>
</div>

<div class="footer">
  © 2026 Neeraj Bhatia | AI Portfolio
</div>

</div>

<script>
let allRepos = [];

/* SMART CATEGORY */
function getCategory(repo) {
  const text = (repo.name + " " + (repo.description || "")).toLowerCase();

  if (["trade","stock","nifty","nse","market","option","intraday"]
      .some(k => text.includes(k))) return "trading";

  if (["cyber","secure","crime","security","fraud"]
      .some(k => text.includes(k))) return "security";

  if (["ai","ml","predict","model","neural"]
      .some(k => text.includes(k))) return "ai";

  return "other";
}

/* IMAGE */
function getImage(category) {
  if (category === "trading") return "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=800";
  if (category === "security") return "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800";
  if (category === "ai") return "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800";
  return "https://images.unsplash.com/photo-1518770660439-4636190af475?w=800";
}

/* RENDER */
function renderRepos(filter) {
  let html = "";

  const filtered = allRepos
    .filter(repo => !repo.fork) // remove this line if needed
    .filter(repo => filter === "all" || getCategory(repo) === filter);

  if (filtered.length === 0) {
    html = "<p style='text-align:center;color:#94a3b8;'>No projects found in this category.</p>";
  }

  filtered.forEach(repo => {
    const category = getCategory(repo);

    html += `
      <div class="card">
        <img src="${getImage(category)}">
        <div class="card-content">
          <span class="tag">${category.toUpperCase()}</span>
          <h3>${repo.name}</h3>
          <p>${repo.description || "Project"}</p>
          <a class="btn" href="${repo.html_url}" target="_blank">Code</a>
          ${repo.homepage ? `<a class="btn" href="${repo.homepage}" target="_blank">Live Demo</a>` : ""}
        </div>
      </div>
    `;
  });

  document.getElementById("repos").innerHTML = html;
}

/* FILTER */
function filterRepos(type) {
  renderRepos(type);
}

/* FETCH ALL REPOS */
fetch("https://api.github.com/users/seneeraj/repos?per_page=100&sort=updated")
  .then(res => res.json())
  .then(data => {
    allRepos = data;
    console.log("Loaded repos:", allRepos.length);
    renderRepos("all");
  })
  .catch(err => {
    console.error("GitHub fetch error:", err);
    document.getElementById("repos").innerHTML =
      "<p style='text-align:center;color:red;'>Failed to load projects.</p>";
  });
</script>

</body>
</html>
