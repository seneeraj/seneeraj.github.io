<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #020617;
  color: white;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* HERO */
.hero {
  text-align: center;
}
.hero h1 {
  font-size: 48px;
}
.hero p {
  color: #94a3b8;
  font-size: 18px;
} 

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

/* RESPONSIVE */
@media (max-width: 992px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* CARD */
.card {
  background: #0f172a;
  border-radius: 16px;
  overflow: hidden;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-6px);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* CONTENT */
.card-content {
  padding: 20px;
}

.tag {
  display: inline-block;
  padding: 5px 10px;
  background: #1e293b;
  border-radius: 6px;
  font-size: 12px;
  color: #38bdf8;
  margin-bottom: 10px;
}

.card h3 {
  margin: 10px 0;
  font-size: 18px;
}

.card p {
  color: #94a3b8;
  font-size: 14px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: 6px;
  background: #38bdf8;
  color: black;
  text-decoration: none;
  font-size: 13px;
}

/* FILTER */
.filters {
  text-align: center;
}
.filters .btn {
  margin: 5px;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 40px 0;
  color: #94a3b8;
}
</style>

</head>

<button class="btn" onclick="filterRepos('all')">All</button> <button class="btn" onclick="filterRepos('ai')">AI</button> <button class="btn" onclick="filterRepos('trading')">Trading</button> <button class="btn" onclick="filterRepos('security')">Cybersecurity</button>

</div>

<!-- PROJECT GRID -->

<div class="section">
  <div class="grid" id="repos"></div>
</div>

<!-- FOOTER -->

<div class="footer">
  © 2026 Neeraj Bhatia | AI Portfolio
</div>

</div>

<script>
let allRepos = [];

/* CATEGORY */
function getCategory(name) {
  name = name.toLowerCase();

  if (name.includes("trade") || name.includes("stock") || name.includes("nifty")) return "trading";
  if (name.includes("crime") || name.includes("secure") || name.includes("cyber")) return "security";
  if (name.includes("ai") || name.includes("ml") || name.includes("predict")) return "ai";

  return "other";
}

/* IMAGE */
function getImage(category) {
  if (category === "trading") return "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=800";
  if (category === "security") return "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800";
  if (category === "ai") return "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800";
  return "https://images.unsplash.com/photo-1518770660439-4636190af475?w=800";
}

/* RENDER */
function renderRepos(filter) {
  let html = "";

  allRepos
    .filter(repo => !repo.fork)
    .filter(repo => filter === "all" || getCategory(repo.name) === filter)
    .forEach(repo => {
      const category = getCategory(repo.name);

      html += `
        <div class="card">
          <img src="${getImage(category)}">
          <div class="card-content">
            <span class="tag">${category.toUpperCase()}</span>
            <h3>${repo.name}</h3>
            <p>${repo.description || "Project"}</p>
            <a class="btn" href="${repo.html_url}" target="_blank">Code</a>
            ${repo.homepage ? `<a class="btn" href="${repo.homepage}" target="_blank">Live Demo</a>` : ""}
          </div>
        </div>
      `;
    });

  document.getElementById("repos").innerHTML = html;
}

/* FILTER */
function filterRepos(type) {
  renderRepos(type);
}

/* FETCH */
fetch("https://api.github.com/users/seneeraj/repos")
  .then(res => res.json())
  .then(data => {
    allRepos = data;
    renderRepos("all");
  });
</script>
