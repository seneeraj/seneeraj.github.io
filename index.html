<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neeraj | AI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #020617;
  color: white;
}

/* Hero Section */
.hero {
  text-align: center;
  padding: 50px 20px;
}
.hero h1 {
  font-size: 40px;
}
.hero p {
  color: #94a3b8;
}

/* Project Grid */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* Cards */
.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  margin: 0;
}

.card p {
  font-size: 14px;
  color: #94a3b8;
}

/* Buttons */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: 8px;
  background: #38bdf8;
  color: black;
  text-decoration: none;
  font-size: 14px;
}
</style>

</head>

<body>

<!-- HERO -->

<div class="hero">
  <h1>🚀 Neeraj Bhatia</h1>
  <p>Building AI Systems | Data Science | Agentic AI</p>
</div>

<!-- PROJECTS -->

<div class="container" id="repos"></div>

<script>
fetch("https://api.github.com/users/seneeraj/repos")
  .then(res => res.json())
  .then(data => {
    let html = "";

    data
      .filter(repo => !repo.fork)
      .forEach(repo => {
        html += `
          <div class="card">
            <h3>${repo.name}</h3>
            <p>${repo.description || "AI/ML Project"}</p>
            <a class="btn" href="${repo.html_url}" target="_blank">View Code</a>
          </div>
        `;
      });

    document.getElementById("repos").innerHTML = html;
  });
</script>

</body>
</html>
